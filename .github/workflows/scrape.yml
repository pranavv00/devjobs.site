name: DevJobsHub Aggregator

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch: # Allow manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install -r agent/requirements.txt
          playwright install chromium

      - name: Run Aggregator
        run: python -m agent.main
        env:
          PYTHONPATH: .

      - name: Commit and Push Changes
        run: |
          git config --global user.name "GitHub Action [DevJobsHub]"
          git config --global user.email "actions@github.com"
          git add src/lib/jobs.json
          git commit -m "chore: auto-update jobs database [skip ci]" || echo "No changes to commit"
          git push
